<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<title>Meu Dashboard Financeiro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #273449;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f1f5f9;
    --muted: #94a3b8;
    --hint: #475569;
    --green: #10b981;
    --green-bg: rgba(16,185,129,0.12);
    --red: #f43f5e;
    --red-bg: rgba(244,63,94,0.12);
    --blue: #3b82f6;
    --blue-bg: rgba(59,130,246,0.12);
    --amber: #f59e0b;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; min-height: 100vh; }

  /* HEADER */
  header { padding: 20px 24px 0; display: flex; justify-content: space-between; align-items: center; }
  .logo { font-size: 16px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
  .month-nav { display: flex; align-items: center; gap: 10px; }
  .month-nav button { background: var(--surface); border: 1px solid var(--border2); color: var(--muted); width: 30px; height: 30px; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all .2s; }
  .month-nav button:hover { background: var(--surface2); color: var(--text); }
  .month-label { font-size: 13px; font-weight: 500; color: var(--text); min-width: 110px; text-align: center; font-family: 'DM Mono', monospace; }

  /* LAYOUT */
  main { padding: 20px 24px; max-width: 960px; margin: 0 auto; }

  /* METRICS */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .metric-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .05em; }
  .metric-value { font-size: 20px; font-weight: 500; font-family: 'DM Mono', monospace; }
  .metric-value.pos { color: var(--green); }
  .metric-value.neg { color: var(--red); }
  .metric-value.neutral { color: var(--text); }

  /* CHARTS */
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .card-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .legend span { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .ldot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  /* FORM */
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 20px; }
  .form-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 14px; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
  .form-group input, .form-group select {
    background: var(--surface2); border: 1px solid var(--border2); color: var(--text);
    border-radius: var(--radius-sm); padding: 8px 10px; font-size: 13px; font-family: 'DM Sans', sans-serif;
    outline: none; transition: border .2s; width: 100%;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--blue); }
  .form-group select option { background: var(--surface2); }
  .form-actions { display: flex; gap: 8px; margin-top: 14px; }
  .btn-add { background: var(--green); color: #fff; border: none; padding: 9px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity .2s; }
  .btn-add:hover { opacity: .85; }
  .btn-cancel { background: transparent; border: 1px solid var(--border2); color: var(--muted); padding: 9px 16px; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .2s; }
  .btn-cancel:hover { background: var(--surface2); color: var(--text); }

  /* TRANSACTIONS */
  .tx-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .tabs { display: flex; gap: 4px; }
  .tab { padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid var(--border2); background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; transition: all .2s; }
  .tab.active { background: var(--surface2); color: var(--text); border-color: var(--border2); }
  .tx-list { display: flex; flex-direction: column; gap: 6px; }
  .tx-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); background: var(--surface2); border: 1px solid var(--border); transition: border .2s; }
  .tx-item:hover { border-color: var(--border2); }
  .tx-icon { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .tx-icon.income { background: var(--green-bg); color: var(--green); }
  .tx-icon.expense { background: var(--blue-bg); color: var(--blue); }
  .tx-info { flex: 1; min-width: 0; }
  .tx-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-meta { font-size: 11px; color: var(--muted); margin-top: 2px; display: flex; align-items: center; gap: 6px; }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 500; }
  .badge-income { background: var(--green-bg); color: var(--green); }
  .badge-expense { background: var(--blue-bg); color: var(--blue); }
  .tx-amount { font-size: 13px; font-weight: 500; font-family: 'DM Mono', monospace; white-space: nowrap; }
  .tx-amount.pos { color: var(--green); }
  .tx-amount.neg { color: var(--text); }
  .tx-actions { display: flex; gap: 2px; }
  .tx-btn { background: transparent; border: none; cursor: pointer; padding: 5px; border-radius: 6px; color: var(--hint); font-size: 14px; transition: all .2s; }
  .tx-btn:hover { background: var(--border); color: var(--text); }
  .tx-btn.del:hover { color: var(--red); }
  .empty { text-align: center; padding: 32px; color: var(--hint); font-size: 13px; }
  .empty-icon { font-size: 32px; margin-bottom: 8px; }

  /* GOALS */
  .goal-item { margin-bottom: 14px; }
  .goal-header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; }
  .goal-name { color: var(--text); font-weight: 500; }
  .goal-pct { color: var(--muted); font-family: 'DM Mono', monospace; }
  .progress-bar { height: 6px; border-radius: 3px; background: var(--surface2); overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width .6s ease; }

  /* TOAST */
  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 12px 16px; font-size: 13px; color: var(--text); opacity: 0; transform: translateY(10px); transition: all .3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    main { padding: 14px; }
    header { padding: 14px 14px 0; }
    .charts-row { grid-template-columns: 1fr; }
    .metrics { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><span class="logo-dot"></span> Finanças</div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)" aria-label="Mês anterior">&#8592;</button>
    <span class="month-label" id="month-label"></span>
    <button onclick="changeMonth(1)" aria-label="Próximo mês">&#8594;</button>
  </div>
</header>

<main>

  <!-- MÉTRICAS -->
  <div class="metrics" id="metrics"></div>

  <!-- GRÁFICOS -->
  <div class="charts-row">
    <div class="card">
      <div class="card-title">Despesas por categoria</div>
      <div class="legend" id="pie-legend"></div>
      <div style="position:relative;width:100%;height:180px">
        <canvas id="pieChart" role="img" aria-label="Despesas por categoria">Gráfico de despesas.</canvas>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Receitas vs despesas</div>
      <div style="position:relative;width:100%;height:210px">
        <canvas id="barChart" role="img" aria-label="Receitas vs despesas por mês">Gráfico mensal.</canvas>
      </div>
    </div>
  </div>

  <!-- FORMULÁRIO -->
  <div class="form-card">
    <div class="form-title" id="form-title">+ Nova transação</div>
    <div class="form-grid">
      <div class="form-group" style="grid-column: span 2;">
        <label>Descrição</label>
        <input type="text" id="f-desc" placeholder="Ex: Aluguel, Salário, Mercado...">
      </div>
      <div class="form-group">
        <label>Valor (R$)</label>
        <input type="number" id="f-value" placeholder="0,00" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>Tipo</label>
        <select id="f-type" onchange="updateCats()">
          <option value="expense">Despesa</option>
          <option value="income">Receita</option>
        </select>
      </div>
      <div class="form-group">
        <label>Categoria</label>
        <select id="f-cat"></select>
      </div>
      <div class="form-group">
        <label>Data</label>
        <input type="date" id="f-date">
      </div>
      <div class="form-group">
        <label>Mês de referência</label>
        <select id="f-month">
          <option value="0">Janeiro</option><option value="1">Fevereiro</option>
          <option value="2">Março</option><option value="3">Abril</option>
          <option value="4">Maio</option><option value="5">Junho</option>
          <option value="6">Julho</option><option value="7">Agosto</option>
          <option value="8">Setembro</option><option value="9">Outubro</option>
          <option value="10">Novembro</option><option value="11">Dezembro</option>
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-add" id="save-btn" onclick="saveTransaction()">Adicionar</button>
      <button class="btn-cancel" onclick="resetForm()">Cancelar</button>
    </div>
  </div>

  <!-- TRANSAÇÕES -->
  <div class="card">
    <div class="tx-header">
      <div class="card-title" style="margin-bottom:0">Transações</div>
      <div class="tabs">
        <button class="tab active" onclick="setFilter('all',this)">Todas</button>
        <button class="tab" onclick="setFilter('income',this)">Receitas</button>
        <button class="tab" onclick="setFilter('expense',this)">Despesas</button>
      </div>
    </div>
    <div class="tx-list" id="tx-list"></div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const CATS = {
  expense: ['Moradia','Alimentação','Transporte','Lazer','Saúde','Educação','Roupas','Assinaturas','Outros'],
  income: ['Salário','Freelance','Investimentos','Aluguel recebido','Bônus','Outros']
};
const CAT_COLORS = ['#3b82f6','#10b981','#f59e0b','#ec4899','#8b5cf6','#f43f5e','#14b8a6','#94a3b8','#f97316'];
const CAT_ICONS = {
  'Moradia':'🏠','Alimentação':'🍽️','Transporte':'🚗','Lazer':'🎮','Saúde':'❤️','Educação':'📚',
  'Roupas':'👕','Assinaturas':'📺','Outros':'📌','Salário':'💼','Freelance':'💻',
  'Investimentos':'📈','Aluguel recebido':'🏢','Bônus':'🎁'
};

let transactions = JSON.parse(localStorage.getItem('fin_transactions') || '[]');
let txFilter = 'all';
let editId = null;
let pieChart = null, barChart = null;
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();

function save() { localStorage.setItem('fin_transactions', JSON.stringify(transactions)); }
function fmt(n) { return 'R$ ' + Math.abs(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function updateCats() {
  const type = document.getElementById('f-type').value;
  const sel = document.getElementById('f-cat');
  sel.innerHTML = CATS[type].map(c => `<option>${c}</option>`).join('');
}

function resetForm() {
  document.getElementById('f-desc').value = '';
  document.getElementById('f-value').value = '';
  document.getElementById('f-type').value = 'expense';
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('f-month').value = new Date().getMonth();
  document.getElementById('form-title').textContent = '+ Nova transação';
  document.getElementById('save-btn').textContent = 'Adicionar';
  updateCats();
  editId = null;
}

function saveTransaction() {
  const desc = document.getElementById('f-desc').value.trim();
  const val = parseFloat(document.getElementById('f-value').value);
  const type = document.getElementById('f-type').value;
  const cat = document.getElementById('f-cat').value;
  const date = document.getElementById('f-date').value;
  const month = parseInt(document.getElementById('f-month').value);
  if (!desc || isNaN(val) || val <= 0) { toast('⚠️ Preencha descrição e valor.'); return; }
  const dateStr = date ? new Date(date + 'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}) : '--/--';
  if (editId !== null) {
    const idx = transactions.findIndex(t => t.id === editId);
    if (idx > -1) transactions[idx] = { ...transactions[idx], desc, val, type, cat, date, dateStr, month };
    toast('✓ Transação atualizada');
    editId = null;
  } else {
    transactions.push({ id: Date.now(), desc, val, type, cat, date, dateStr, month, year: currentYear });
    toast('✓ Transação adicionada');
  }
  save(); resetForm(); renderAll();
}

function deleteTransaction(id) {
  if (!confirm('Excluir esta transação?')) return;
  transactions = transactions.filter(t => t.id !== id);
  save(); renderAll(); toast('Transação excluída');
}

function editTransaction(id) {
  const t = transactions.find(x => x.id === id);
  if (!t) return;
  document.getElementById('f-desc').value = t.desc;
  document.getElementById('f-value').value = t.val;
  document.getElementById('f-type').value = t.type;
  updateCats();
  document.getElementById('f-cat').value = t.cat;
  document.getElementById('f-date').value = t.date || '';
  document.getElementById('f-month').value = t.month;
  editId = id;
  document.getElementById('form-title').textContent = '✏️ Editar transação';
  document.getElementById('save-btn').textContent = 'Salvar';
  document.getElementById('f-desc').focus();
  window.scrollTo({ top: document.querySelector('.form-card').offsetTop - 20, behavior: 'smooth' });
}

function setFilter(f, btn) {
  txFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderTxList();
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  document.getElementById('month-label').textContent = MONTHS[currentMonth] + ' ' + currentYear;
  renderAll();
}

function getMonthTx() {
  return transactions.filter(t => t.month === currentMonth && (t.year === currentYear || !t.year));
}

function renderMetrics() {
  const tx = getMonthTx();
  const income = tx.filter(t => t.type === 'income').reduce((a, t) => a + t.val, 0);
  const expense = tx.filter(t => t.type === 'expense').reduce((a, t) => a + t.val, 0);
  const balance = income - expense;
  const rate = income > 0 ? Math.round((balance / income) * 100) : 0;
  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-label">Receitas</div><div class="metric-value pos">${fmt(income)}</div></div>
    <div class="metric"><div class="metric-label">Despesas</div><div class="metric-value neg">${fmt(expense)}</div></div>
    <div class="metric"><div class="metric-label">Saldo</div><div class="metric-value ${balance >= 0 ? 'pos' : 'neg'}">${(balance < 0 ? '-' : '') + fmt(balance)}</div></div>
    <div class="metric"><div class="metric-label">Poupança</div><div class="metric-value neutral">${rate}%</div></div>
  `;
}

function renderPie() {
  const tx = getMonthTx().filter(t => t.type === 'expense');
  if (pieChart) { pieChart.destroy(); pieChart = null; }
  if (!tx.length) { document.getElementById('pie-legend').innerHTML = '<span style="color:var(--hint);font-size:12px">Sem despesas este mês</span>'; return; }
  const catMap = {};
  tx.forEach(t => { catMap[t.cat] = (catMap[t.cat] || 0) + t.val; });
  const cats = Object.keys(catMap), vals = Object.values(catMap);
  const total = vals.reduce((a, b) => a + b, 0);
  const colors = cats.map((_, i) => CAT_COLORS[i % CAT_COLORS.length]);
  document.getElementById('pie-legend').innerHTML = cats.map((c, i) =>
    `<span><span class="ldot" style="background:${colors[i]}"></span>${c} ${Math.round(vals[i]/total*100)}%</span>`
  ).join('');
  pieChart = new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: { labels: cats, datasets: [{ data: vals, backgroundColor: colors, borderWidth: 0, hoverOffset: 4 }] },
    options: { responsive: true, maintainAspectRatio: false, cutout: '60%',
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${fmt(ctx.raw)}` } } }
    }
  });
}

function renderBar() {
  if (barChart) { barChart.destroy(); barChart = null; }
  const months = [], incomes = [], expenses = [];
  for (let i = Math.max(0, currentMonth - 4); i <= currentMonth; i++) {
    const tx = transactions.filter(t => t.month === i && (t.year === currentYear || !t.year));
    months.push(MONTHS[i].substring(0, 3));
    incomes.push(tx.filter(t => t.type === 'income').reduce((a, t) => a + t.val, 0));
    expenses.push(tx.filter(t => t.type === 'expense').reduce((a, t) => a + t.val, 0));
  }
  barChart = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels: months,
      datasets: [
        { label: 'Receitas', data: incomes, backgroundColor: '#10b981', borderRadius: 4 },
        { label: 'Despesas', data: expenses, backgroundColor: '#3b82f6', borderRadius: 4 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#94a3b8', font: { size: 11, family: 'DM Sans' }, boxWidth: 10, boxHeight: 10 } } },
      scales: {
        y: { ticks: { color: '#475569', callback: v => v >= 1000 ? 'R$' + (v/1000).toFixed(0) + 'k' : 'R$' + v, font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } },
        x: { ticks: { color: '#475569', font: { size: 11 } }, grid: { display: false } }
      }
    }
  });
}

function renderTxList() {
  const tx = getMonthTx();
  const filtered = txFilter === 'all' ? tx : tx.filter(t => t.type === txFilter);
  const el = document.getElementById('tx-list');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📭</div>Nenhuma transação aqui.<br>Adicione usando o formulário acima.</div>`;
    return;
  }
  const sorted = [...filtered].sort((a, b) => (b.date || '') > (a.date || '') ? 1 : -1);
  el.innerHTML = sorted.map(t => `
    <div class="tx-item">
      <div class="tx-icon ${t.type}">${CAT_ICONS[t.cat] || '📌'}</div>
      <div class="tx-info">
        <div class="tx-name">${t.desc}</div>
        <div class="tx-meta">${t.dateStr} <span class="badge ${t.type === 'income' ? 'badge-income' : 'badge-expense'}">${t.cat}</span></div>
      </div>
      <div class="tx-amount ${t.type === 'income' ? 'pos' : 'neg'}">${t.type === 'income' ? '+' : '-'}${fmt(t.val)}</div>
      <div class="tx-actions">
        <button class="tx-btn" onclick="editTransaction(${t.id})" title="Editar">✏️</button>
        <button class="tx-btn del" onclick="deleteTransaction(${t.id})" title="Excluir">🗑️</button>
      </div>
    </div>
  `).join('');
}

function renderAll() { renderMetrics(); renderPie(); renderBar(); renderTxList(); }

// Init
document.getElementById('month-label').textContent = MONTHS[currentMonth] + ' ' + currentYear;
document.getElementById('f-month').value = currentMonth;
document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
updateCats();
renderAll();
</script>
</body>
</html>
